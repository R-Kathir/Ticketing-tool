<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - System Error | NexusDesk</title>
    <link rel="stylesheet" href="404page.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>

<body>

    <section class="not-found-section">
        <!-- Technical Noise / Grid Background -->
        <div class="noise-overlay"></div>
        <div class="grid-overlay"></div>

        <div class="not-found-content">
            <span class="badge-outline">Status Code: 404</span>

            <!-- Glitch Title -->
            <h1 class="glitch-title" data-text="404">404</h1>

            <h2 class="sub-title">Page Not Found</h2>
            <p class="description">
                The requested ticket, workspace, or system page could not be located.
                It may have been deleted, or the routing logic failed.
            </p>

            <div class="action-group">
                <a href="index.html" class="btn-primary">Return to Home Page</a>
                <button onclick="history.back()" class="btn-ghost">Go Back</button>
            </div>
        </div>
    </section>

    <!-- GSAP for smooth entrance -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const tl = gsap.timeline();

            // Fade in the background grid slightly
            tl.from(".grid-overlay", {
                opacity: 0,
                duration: 1.5,
                ease: "power2.out"
            })
                // Scale and fade in the badge
                .from(".badge-outline", {
                    y: -10,
                    opacity: 0,
                    duration: 0.6,
                    ease: "power2.out"
                }, "-=1")
                // Slam down the massive 404 text
                .from(".glitch-title", {
                    scale: 1.2,
                    opacity: 0,
                    filter: "blur(10px)",
                    duration: 0.8,
                    ease: "power4.out"
                }, "-=0.4")
                // Float up the subtitle, description, and buttons
                .from(".sub-title, .description > *", {
                    y: 20,
                    opacity: 0,
                    duration: 0.6,
                    stagger: 0.1,
                    ease: "power2.out"
                }, "-=0.3");
        });
    </script>
</body>

</html>
